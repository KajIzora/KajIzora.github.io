<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 225" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafaf7" />
  
  <!-- Presentation Screen Box -->
  <rect x="30" y="30" width="160" height="100" fill="none" stroke="#2e5036" stroke-width="1.5" />
  <rect x="35" y="35" width="150" height="90" fill="#eef3ef" fill-opacity="0.5" />
  
  <!-- Slide content (Network schematic mockup) -->
  <circle cx="65" cy="80" r="8" fill="none" stroke="#2e5036" stroke-width="1.5" />
  <circle cx="110" cy="60" r="8" fill="none" stroke="#2e5036" stroke-width="1.5" />
  <circle cx="110" cy="100" r="8" fill="none" stroke="#2e5036" stroke-width="1.5" />
  <circle cx="155" cy="80" r="8" fill="#2e5036" />
  
  <!-- Connections -->
  <line x1="73" y1="76" x2="102" y2="64" stroke="#2e5036" stroke-width="1" />
  <line x1="73" y1="84" x2="102" y2="96" stroke="#2e5036" stroke-width="1" />
  <line x1="118" y1="64" x2="147" y2="76" stroke="#2e5036" stroke-width="1" />
  <line x1="118" y1="96" x2="147" y2="84" stroke="#2e5036" stroke-width="1" />
  
  <!-- Title text on screen -->
  <text x="45" y="52" font-family="Inter, sans-serif" font-size="7" font-weight="600" fill="#2e5036">Bayesian Inference</text>

  <!-- Podium / Lectern -->
  <path d="M 215 110 L 230 110 L 235 170 L 210 170 Z" fill="none" stroke="#1c1c1a" stroke-width="1.5" />
  <line x1="210" y1="110" x2="235" y2="110" stroke="#1c1c1a" stroke-width="2" />
  
  <!-- Speaker Outline (Podium is at 215-230, Speaker stands behind it) -->
  <!-- Head -->
  <circle cx="218" cy="78" r="7" fill="none" stroke="#1c1c1a" stroke-width="1.5" />
  <!-- Body/Shoulders -->
  <path d="M 205 105 C 205 90, 231 90, 231 105" fill="none" stroke="#1c1c1a" stroke-width="1.5" />
  <!-- Arm pointing to screen -->
  <path d="M 210 93 L 185 85" fill="none" stroke="#1c1c1a" stroke-width="1.5" stroke-linecap="round" />

  <!-- Floor line -->
  <line x1="15" y1="170" x2="285" y2="170" stroke="#e2e2da" stroke-width="1.5" />
  
  <!-- Stage labels or metadata overlay -->
  <rect x="30" y="145" width="105" height="16" rx="2" fill="#fafaf7" stroke="#e2e2da" stroke-width="1" />
  <text x="35" y="156" font-family="Inter, sans-serif" font-size="8" fill="#5c5c56">Northeast Complex Systems</text>
  
  <!-- Audience silhouettes (bottom) -->
  <path d="M 40 220 C 40 205, 70 205, 70 220" fill="#5c5c56" fill-opacity="0.15" />
  <circle cx="55" cy="198" r="6" fill="#5c5c56" fill-opacity="0.15" />
  
  <path d="M 100 220 C 100 203, 130 203, 130 220" fill="#5c5c56" fill-opacity="0.15" />
  <circle cx="115" cy="195" r="6" fill="#5c5c56" fill-opacity="0.15" />

  <path d="M 160 220 C 160 206, 190 206, 190 220" fill="#5c5c56" fill-opacity="0.15" />
  <circle cx="175" cy="197" r="6" fill="#5c5c56" fill-opacity="0.15" />
</svg>
