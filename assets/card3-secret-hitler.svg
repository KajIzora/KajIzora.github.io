<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafaf7" />

  <!-- Layout Dividers -->
  <line x1="160" y1="20" x2="160" y2="180" stroke="#e2e2da" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Left: Private Reasoning (Hidden CoT) -->
  <g transform="translate(10, 20)">
    <!-- Header -->
    <rect x="0" y="0" width="140" height="18" rx="2" fill="#eef3ef" stroke="#2e5036" stroke-width="1" />
    <text x="70" y="12" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#2e5036" text-anchor="middle">PRIVATE REASONING (CoT)</text>
    
    <!-- Code/Text Block -->
    <rect x="0" y="24" width="140" height="136" rx="2" fill="#fafaf7" stroke="#e2e2da" stroke-width="1" />
    
    <text x="8" y="42" font-family="Inter, sans-serif" font-size="7" fill="#5c5c56" font-weight="600">ROLE: FASCIST</text>
    <text x="8" y="56" font-family="Inter, sans-serif" font-size="7" fill="#5c5c56" font-weight="600">TARGET: PLAYER 3</text>
    <text x="8" y="70" font-family="Inter, sans-serif" font-size="7" fill="#5c5c56" font-weight="600">STRATEGY: DECEIVE</text>
    
    <!-- Narrative reasoning paragraph -->
    <text x="8" y="90" font-family="EB Garamond, serif" font-size="8" fill="#1c1c1a">"Player 3 suspects my</text>
    <text x="8" y="102" font-family="EB Garamond, serif" font-size="8" fill="#1c1c1a">allegiance. If I agree</text>
    <text x="8" y="114" font-family="EB Garamond, serif" font-size="8" fill="#1c1c1a">with them, I build trust.</text>
    <text x="8" y="126" font-family="EB Garamond, serif" font-size="8" fill="#1c1c1a">I must deflect blame to</text>
    <text x="8" y="138" font-family="EB Garamond, serif" font-size="8" fill="#1c1c1a">Player 4 immediately..."</text>
  </g>

  <!-- Right: Public Speech (Observed Actions) -->
  <g transform="translate(170, 20)">
    <!-- Header -->
    <rect x="0" y="0" width="140" height="18" rx="2" fill="#fafaf7" stroke="#1c1c1a" stroke-width="1" />
    <text x="70" y="12" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#1c1c1a" text-anchor="middle">PUBLIC CHAT / ACTIONS</text>
    
    <!-- Dialogue Bubbles -->
    <!-- Bubble 1 (Player 3) -->
    <path d="M 5 44 L 115 44 L 115 24 L 5 24 Z" fill="#f4f4f0" />
    <polygon points="10,44 14,48 18,44" fill="#f4f4f0" />
    <text x="10" y="36" font-family="Inter, sans-serif" font-size="7" fill="#5c5c56"><tspan font-weight="600" fill="#1c1c1a">Player 3:</tspan> Who passed Fascist?</text>
    
    <!-- Bubble 2 (Agent Speech) -->
    <path d="M 25 90 L 135 90 L 135 55 L 25 55 Z" fill="#eef3ef" stroke="#2e5036" stroke-width="0.8" />
    <polygon points="125,90 121,94 117,90" fill="#eef3ef" stroke="#2e5036" stroke-width="0.8" />
    <!-- cover line of triangle in bubble -->
    <line x1="124" y1="90" x2="118" y2="90" stroke="#eef3ef" stroke-width="1" />
    <text x="30" y="68" font-family="Inter, sans-serif" font-size="7" fill="#2e5036"><tspan font-weight="600" fill="#1c1c1a">Agent (You):</tspan> I had no choice,</text>
    <text x="30" y="78" font-family="Inter, sans-serif" font-size="7" fill="#2e5036">Player 4 drew two Fascist</text>
    <text x="30" y="86" font-family="Inter, sans-serif" font-size="7" fill="#2e5036">cards and forced my hand.</text>

    <!-- Small UI tag -->
    <rect x="45" y="145" width="50" height="12" rx="2" fill="#fafaf7" stroke="#e2e2da" stroke-width="1" />
    <text x="70" y="153" font-family="Inter, sans-serif" font-size="6" fill="#5c5c56" text-anchor="middle">NEJCS 2025</text>
  </g>
</svg>
