<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafaf7" />
  
  <!-- Technical Grid -->
  <g stroke="#eef3ef" stroke-width="0.5">
    <line x1="0" y1="40" x2="320" y2="40" />
    <line x1="0" y1="80" x2="320" y2="80" />
    <line x1="0" y1="120" x2="320" y2="120" />
    <line x1="0" y1="160" x2="320" y2="160" />
    <line x1="40" y1="0" x2="40" y2="200" />
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="120" y1="0" x2="120" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
    <line x1="280" y1="0" x2="280" y2="200" />
  </g>

  <!-- Battery Module Shell Outline -->
  <rect x="20" y="50" width="280" height="120" fill="none" stroke="#e2e2da" stroke-width="1.5" rx="3" />
  
  <!-- Battery Cells -->
  <g stroke="#e2e2da" stroke-width="1" fill="none">
    <!-- Cell 1 -->
    <rect x="35" y="65" width="70" height="90" rx="2" />
    <circle cx="70" cy="110" r="15" stroke-dasharray="2 2" />
    
    <!-- Cell 2 (Under disassembly) -->
    <rect x="125" y="65" width="70" height="90" rx="2" stroke="#2e5036" stroke-width="1.5" />
    
    <!-- Cell 3 -->
    <rect x="215" y="65" width="70" height="90" rx="2" />
    <circle cx="250" cy="110" r="15" stroke-dasharray="2 2" />
  </g>
  
  <!-- The Target Bolt (Occluded/Obstructed) -->
  <!-- We draw a hex bolt on Cell 2 -->
  <!-- Since it's occluded, we show two possible estimated poses of the bolt head (Bimodal belief) -->
  <g transform="translate(160, 110)">
    <!-- Actual Bolt (faint, under occlusion) -->
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#5c5c56" stroke-opacity="0.3" stroke-width="1" />
    
    <!-- Obstruction/Occlusion bar representing a cable or plate blocking the view -->
    <line x1="-35" y1="-25" x2="15" y2="25" stroke="#1c1c1a" stroke-dasharray="3 3" stroke-width="1" />
    <polygon points="-30,-20 10,20 18,12 -22,-28" fill="#1c1c1a" fill-opacity="0.08" stroke="#1c1c1a" stroke-opacity="0.2" stroke-width="0.5" />

    <!-- Mode A Belief (Left offset) -->
    <g transform="translate(-15, -8) rotate(15)">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#2e5036" stroke-width="1.5" fill="#2e5036" fill-opacity="0.05" />
      <text x="0" y="3" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#2e5036" text-anchor="middle">Mode A</text>
    </g>
    
    <!-- Mode B Belief (Right offset) -->
    <g transform="translate(18, 12) rotate(-10)">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#2e5036" stroke-width="1.5" fill="#2e5036" fill-opacity="0.05" />
      <text x="0" y="3" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#2e5036" text-anchor="middle">Mode B</text>
    </g>
    
    <!-- Estimation Probability indicator link -->
    <path d="M -15 -8 Q 0 0 18 12" fill="none" stroke="#2e5036" stroke-opacity="0.5" stroke-dasharray="3 2" />
  </g>

  <!-- Title/Status Label -->
  <text x="30" y="30" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#2e5036">STATE: BIMODAL BELIEF OVER BOLT POSE [SNPE]</text>
</svg>
