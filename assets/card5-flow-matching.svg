<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafaf7" />

  <!-- Grid lines (faint) -->
  <g stroke="#f4f4f0" stroke-width="0.8">
    <line x1="0" y1="40" x2="320" y2="40" />
    <line x1="0" y1="80" x2="320" y2="80" />
    <line x1="0" y1="120" x2="320" y2="120" />
    <line x1="0" y1="160" x2="320" y2="160" />
    <line x1="60" y1="0" x2="60" y2="200" />
    <line x1="120" y1="0" x2="120" y2="200" />
    <line x1="180" y1="0" x2="180" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
  </g>

  <!-- Source Distribution q_0 (Simple Gaussian Circle) -->
  <circle cx="60" cy="100" r="25" fill="#5c5c56" fill-opacity="0.05" stroke="#5c5c56" stroke-width="1.2" stroke-dasharray="3 2" />
  <circle cx="60" cy="100" r="1.5" fill="#5c5c56" />
  <text x="60" y="65" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#5c5c56" text-anchor="middle">Source p_0</text>

  <!-- Target Distribution q_1 (Complex shape - bimodal or crescent) -->
  <path d="M 230 60 Q 255 60, 260 85 T 240 135 T 260 145" fill="none" stroke="#2e5036" stroke-width="1.2" stroke-dasharray="3 2" />
  <!-- A couple of target clusters -->
  <ellipse cx="250" cy="75" rx="15" ry="20" fill="#2e5036" fill-opacity="0.05" stroke="#2e5036" stroke-width="1.2" />
  <ellipse cx="240" cy="125" rx="18" ry="15" fill="#2e5036" fill-opacity="0.05" stroke="#2e5036" stroke-width="1.2" />
  <text x="245" y="45" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#2e5036" text-anchor="middle">Target p_1</text>

  <!-- Vector Field Arrows (Flow Matching field v_t) -->
  <g stroke="#2e5036" stroke-width="0.8" fill="#2e5036" opacity="0.45">
    <!-- Arrow definitions / paths -->
    <!-- Grid row 1 -->
    <path d="M 100 65 L 115 62" /> <polygon points="115,62 110,60 111,64" />
    <path d="M 140 60 L 158 58" /> <polygon points="158,58 153,56 154,60" />
    <path d="M 180 62 L 198 68" /> <polygon points="198,68 193,65 195,69" />
    
    <!-- Grid row 2 (toward upper mode) -->
    <path d="M 105 85 L 122 81" /> <polygon points="122,81 117,79 118,83" />
    <path d="M 145 80 L 165 78" /> <polygon points="165,78 160,75 161,79" />
    <path d="M 185 82 L 208 81" /> <polygon points="208,81 203,79 204,83" />
    
    <!-- Grid row 3 (central split) -->
    <path d="M 110 100 L 128 100" /> <polygon points="128,100 123,98 123,102" />
    <path d="M 150 100 L 170 101" /> <polygon points="170,101 165,99 165,103" />
    
    <!-- Grid row 4 (toward lower mode) -->
    <path d="M 105 115 L 122 120" /> <polygon points="122,120 118,117 117,121" />
    <path d="M 145 120 L 164 125" /> <polygon points="164,125 161,121 160,125" />
    <path d="M 185 118 L 205 122" /> <polygon points="205,122 201,119 200,123" />

    <!-- Grid row 5 -->
    <path d="M 100 135 L 115 142" /> <polygon points="115,142 111,138 110,142" />
    <path d="M 140 140 L 158 147" /> <polygon points="158,147 154,143 153,147" />
    <path d="M 180 138 L 196 142" /> <polygon points="196,142 192,139 191,143" />
  </g>

  <!-- Flow Trajectories (Solid paths) -->
  <g stroke="#1c1c1a" stroke-width="1.2" fill="none" stroke-linecap="round">
    <!-- Path 1: Upper -->
    <path d="M 78 88 C 110 75, 160 70, 235 75" />
    <circle cx="78" cy="88" r="2.5" fill="#1c1c1a" />
    <polygon points="160,71 155,69 156,73" fill="#1c1c1a" />
    
    <!-- Path 2: Central Split -->
    <path d="M 85 100 C 120 100, 160 102, 222 120" />
    <circle cx="85" cy="100" r="2.5" fill="#1c1c1a" />
    <polygon points="150,101 145,99 145,103" fill="#1c1c1a" />
    
    <!-- Path 3: Lower -->
    <path d="M 78 112 C 110 125, 160 135, 225 128" />
    <circle cx="78" cy="112" r="2.5" fill="#1c1c1a" />
    <polygon points="155,133 150,131 151,135" fill="#1c1c1a" />
  </g>

  <!-- Title / Formula Overlay -->
  <text x="160" y="30" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#2e5036" text-anchor="middle">dx_t = v_t(x_t) dt  [CNF Flow Matching]</text>
</svg>
