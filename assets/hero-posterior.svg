<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 375" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafaf7" />
  
  <!-- Grid lines -->
  <g stroke="#e8e8e0" stroke-width="1">
    <line x1="50" y1="50" x2="50" y2="320" />
    <line x1="110" y1="50" x2="110" y2="320" />
    <line x1="170" y1="50" x2="170" y2="320" />
    <line x1="230" y1="50" x2="230" y2="320" />
    <line x1="290" y1="50" x2="290" y2="320" />
    <line x1="350" y1="50" x2="350" y2="320" />
    <line x1="410" y1="50" x2="410" y2="320" />
    <line x1="470" y1="50" x2="470" y2="320" />
    
    <line x1="50" y1="50" x2="470" y2="50" />
    <line x1="50" y1="104" x2="470" y2="104" />
    <line x1="50" y1="158" x2="470" y2="158" />
    <line x1="50" y1="212" x2="470" y2="212" />
    <line x1="50" y1="266" x2="470" y2="266" />
    <line x1="50" y1="320" x2="470" y2="320" />
  </g>

  <!-- Axes -->
  <g stroke="#5c5c56" stroke-width="1.5" fill="none">
    <line x1="50" y1="320" x2="470" y2="320" />
    <line x1="50" y1="50" x2="50" y2="320" />
  </g>

  <!-- Mode 1 Contours (Primary peak - Bottom Left) -->
  <!-- Centered at (170, 230) -->
  <g stroke="#2e5036" fill="none" stroke-linecap="round">
    <!-- Contour 1 (outermost, very faint) -->
    <ellipse cx="170" cy="230" rx="90" ry="60" stroke-opacity="0.15" stroke-width="1" />
    <ellipse cx="170" cy="230" rx="75" ry="50" stroke-opacity="0.3" stroke-width="1.2" />
    <ellipse cx="170" cy="230" rx="60" ry="40" stroke-opacity="0.5" stroke-width="1.5" />
    <ellipse cx="170" cy="230" rx="45" ry="30" stroke-opacity="0.75" stroke-width="1.8" />
    <ellipse cx="170" cy="230" rx="30" ry="20" stroke-opacity="0.9" stroke-width="2" fill="#2e5036" fill-opacity="0.05" />
    <ellipse cx="170" cy="230" rx="15" ry="10" stroke-opacity="1" stroke-width="2.5" fill="#2e5036" fill-opacity="0.15" />
    <!-- Peak marker -->
    <circle cx="170" cy="230" r="2" fill="#2e5036" />
  </g>

  <!-- Mode 2 Contours (Secondary peak - Top Right) -->
  <!-- Centered at (350, 120) -->
  <g stroke="#2e5036" fill="none" stroke-linecap="round">
    <ellipse cx="350" cy="120" rx="70" ry="55" transform="rotate(-15 350 120)" stroke-opacity="0.15" stroke-width="1" />
    <ellipse cx="350" cy="120" rx="58" ry="45" transform="rotate(-15 350 120)" stroke-opacity="0.3" stroke-width="1.2" />
    <ellipse cx="350" cy="120" rx="46" ry="36" transform="rotate(-15 350 120)" stroke-opacity="0.5" stroke-width="1.5" />
    <ellipse cx="350" cy="120" rx="34" ry="26" transform="rotate(-15 350 120)" stroke-opacity="0.75" stroke-width="1.8" />
    <ellipse cx="350" cy="120" rx="22" ry="17" transform="rotate(-15 350 120)" stroke-opacity="0.9" stroke-width="2" fill="#2e5036" fill-opacity="0.05" />
    <ellipse cx="350" cy="120" rx="10" ry="8" transform="rotate(-15 350 120)" stroke-opacity="1" stroke-width="2.2" fill="#2e5036" fill-opacity="0.1" />
    <!-- Peak marker -->
    <circle cx="350" cy="120" r="2" fill="#2e5036" />
  </g>

  <!-- Trajectory overlay / MCMC chain or Flow path -->
  <path d="M 60 280 L 110 260 L 130 210 L 155 240 L 170 230" 
        fill="none" stroke="#1c1c1a" stroke-width="1.5" stroke-dasharray="4 3" />
  <circle cx="60" cy="280" r="3" fill="#1c1c1a" />
  <circle cx="170" cy="230" r="4" fill="#2e5036" />
  
  <path d="M 450 70 L 410 90 L 380 140 L 340 100 L 350 120" 
        fill="none" stroke="#1c1c1a" stroke-width="1.5" stroke-dasharray="4 3" />
  <circle cx="450" cy="70" r="3" fill="#1c1c1a" />
  <circle cx="350" cy="120" r="4" fill="#2e5036" />

  <!-- Labels -->
  <text x="450" y="340" font-family="Inter, sans-serif" font-size="12" fill="#5c5c56" text-anchor="middle">Position (x)</text>
  <text x="35" y="60" font-family="Inter, sans-serif" font-size="12" fill="#5c5c56" text-anchor="end">Rotation (θ)</text>
  
  <text x="170" y="235" font-family="Inter, sans-serif" font-size="9" fill="#2e5036" font-weight="600" text-anchor="middle" transform="translate(0, -25)">Mode A</text>
  <text x="350" y="125" font-family="Inter, sans-serif" font-size="9" fill="#2e5036" font-weight="600" text-anchor="middle" transform="translate(0, -22)">Mode B</text>

  <!-- Legend -->
  <rect x="300" y="250" width="150" height="55" fill="#fafaf7" fill-opacity="0.9" stroke="#e2e2da" stroke-width="1" />
  <text x="315" y="270" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#1c1c1a">Posterior Belief p(θ|x)</text>
  
  <!-- Legend symbols -->
  <line x1="315" y1="285" x2="335" y2="285" stroke="#2e5036" stroke-width="2" />
  <text x="345" y="289" font-family="Inter, sans-serif" font-size="9" fill="#5c5c56">Density Contours</text>
</svg>
